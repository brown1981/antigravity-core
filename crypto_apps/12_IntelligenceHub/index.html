<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Hub | Antigravity Strategic</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    
    <!-- External Dependencies -->
    <script src="../config.js"></script>
    
    <!-- Internal Assets (SOLID) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="position:fixed; top:20px; left:20px; right:20px; display:flex; justify-content:space-between; align-items:center; z-index:1000;">
        <a href="../../index.html" class="back-btn">[ RETURN_TO_NEXUS ]</a>
        <div class="lang-selector">
            <button onclick="setLang('ja')" style="background:var(--glass); color:var(--library-gold); border:1px solid var(--border); padding:5px 15px; cursor:pointer; border-radius:4px;">JP</button>
            <button onclick="setLang('en')" style="background:var(--glass); color:var(--library-gold); border:1px solid var(--border); padding:5px 15px; cursor:pointer; border-radius:4px;">EN</button>
        </div>
    </nav>

    <main class="hub-container">
        <header>
            <h1>INTELLIGENCE_HUB</h1>
            <p>CENTRALIZED KNOWLEDGE ARCHIVE & HARVESTER CONTROL</p>
        </header>

        <div class="hub-grid">
            <!-- Left: Knowledge Archive -->
            <section class="archive-panel">
                <h2>KNOWLEDGE_ARCHIVE</h2>
                <div id="archive-list">
                    <!-- Archives injected by script.js -->
                </div>
            </section>

            <!-- Right: Harvester Monitor -->
            <aside class="monitor-panel">
                <div class="monitor-card">
                    <h3>SYSTEM_STATUS</h3>
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        <span id="status-text">SYSTEM_LIVE</span>
                    </div>
                    <div style="margin-top:15px; font-size:0.7rem; color:#444;">
                        UPTIME: <span id="uptime-val" style="color:var(--library-gold);">---</span>
                    </div>
                </div>

                <div class="monitor-card">
                    <h3>DATA_SOURCES</h3>
                    <div id="source-list">
                        <!-- Sources injected by script.js -->
                    </div>
                </div>

                <div class="monitor-card" style="border-style: dashed; opacity: 0.6;">
                    <h3>HARVEST_LOAD</h3>
                    <div style="height: 40px; display:flex; align-items:flex-end; gap:3px;">
                        <div style="flex:1; height:40%; background:var(--library-gold); opacity:0.3;"></div>
                        <div style="flex:1; height:70%; background:var(--library-gold); opacity:0.5;"></div>
                        <div style="flex:1; height:90%; background:var(--library-gold); opacity:0.8;"></div>
                        <div style="flex:1; height:60%; background:var(--library-gold); opacity:0.4;"></div>
                        <div style="flex:1; height:85%; background:var(--library-gold); opacity:0.7;"></div>
                    </div>
                </div>

                <button class="sync-btn" id="sync-btn" onclick="triggerSync()">MANUAL_HARVEST_SYNC</button>
            </aside>
        </div>
    </main>

    <!-- Scripts (SOLID) -->
    <script src="i18n.js"></script>
    <script src="harvester.js"></script>
    <script src="script.js"></script>
</body>
</html>
