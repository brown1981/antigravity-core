<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Sentinel | Antigravity Strategic</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    
    <!-- External Dependencies -->
    <script src="../config.js"></script>
    
    <!-- Internal Assets (SOLID) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="position:fixed; top:20px; left:20px; right:20px; display:flex; justify-content:space-between; align-items:center; z-index:1000;">
        <a href="../../index.html" class="back-btn">[ RETURN_TO_NEXUS ]</a>
        <div class="lang-selector">
            <button onclick="setLang('ja')" style="background:var(--glass); color:var(--quant-green); border:1px solid var(--border); padding:5px 15px; cursor:pointer; border-radius:4px;">JP</button>
            <button onclick="setLang('en')" style="background:var(--glass); color:var(--quant-green); border:1px solid var(--border); padding:5px 15px; cursor:pointer; border-radius:4px;">EN</button>
        </div>
    </nav>

    <main class="quant-wrapper">
        <!-- Sidebar: Market Scanner -->
        <section class="panel">
            <h2>INSTITUTIONAL_SCANNER</h2>
            <div class="scanner-list" id="scanner-list">
                <!-- Scan items injected by script.js -->
            </div>
            
            <div style="margin-top: 30px; padding: 20px; background: rgba(0, 255, 102, 0.05); border-radius: 8px; font-size: 0.65rem; color: #666; line-height: 1.6;">
                <strong style="color:var(--quant-green); display:block; margin-bottom:10px;">SMC_ALGORITHM:</strong>
                機関の蓄積（Accumulation）と操作（Manipulation）を検知中。小口投資家の罠を避け、巨大な波に乗れ。
            </div>
        </section>

        <!-- Main Chart: SMC Visualization -->
        <section class="panel" style="padding: 0; overflow: hidden;">
            <div style="padding: 25px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0;">QUANT_PRECISION_CHART</h2>
                <div style="font-size:0.6rem; color:var(--quant-green); letter-spacing:2px;">DATA_SOURCE: ON-CHAIN_LIQUIDITY_MAP</div>
            </div>
            
            <div class="chart-container" style="flex:1; margin:20px;" id="chart-area">
                <!-- Chart elements injected by script.js -->
            </div>
            
            <div style="padding: 15px 25px; font-size: 0.6rem; color: #444; border-top: 1px solid var(--border); display:flex; gap:20px;">
                <span>PURPLE: ORDER_BLOCK</span>
                <span>GREEN_DASH: FAIR_VALUE_GAP</span>
                <span style="margin-left:auto;">SENTINEL_ACTIVE_V4.2</span>
            </div>
        </section>
    </main>

    <!-- Scripts (SOLID) -->
    <script src="i18n.js"></script>
    <script src="quant_engine.js"></script>
    <script src="script.js"></script>
</body>
</html>
